version: "3.8"

services:
  # ─── MongoDB Database ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: hmis-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hmis_db
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-adminpassword}
    networks:
      - hmis-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Token blocklist & caching) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hmis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hmis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── HMIS Backend API (FastAPI) ────────────────────────────────────
  hmis-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hmis-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-adminpassword}@mongodb:27017/hmis_db?authSource=admin
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_use_strong_key}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    networks:
      - hmis-network

  # ─── HMIS Frontend Web (React + Nginx) ─────────────────────────────
  hmis-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hmis-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - hmis-api
    networks:
      - hmis-network

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hmis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - hmis-api
      - hmis-web
    networks:
      - hmis-network

volumes:
  mongo_data:
  redis_data:
  api_uploads:

networks:
  hmis-network:
    driver: bridge
